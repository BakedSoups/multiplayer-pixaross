<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nonogram Pictures</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #cac3b5;
      color: #363431;
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    canvas {
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
      outline: none;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 14px;
      font-size: 13px;
      opacity: 0.75;
    }

    #clipboard {
      position: fixed;
      left: -1000px;
      top: -1000px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <textarea id="clipboard" aria-hidden="true" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  <script src="config.js" onerror="this.remove()"></script>
  <script src="howler.min.js"></script>
  <script src="wasm_exec.js"></script>
  <script>
    const music = new Howl({
      src: ["audio/tunetank-lounge-jazz-elevator-music-348999.mp3"],
      loop: true,
      volume: 0.35,
      html5: true
    });
    const sfx = {
      pencil: new Howl({
        src: ["audio/u_o8xh7gwsrj-app_interface_click_2-476372.mp3"],
        volume: 0.65
      }),
      eraser: new Howl({
        src: ["audio/audley_fergine-ui-button-click-5-327756.mp3"],
        volume: 0.65
      }),
      correct: new Howl({
        src: ["audio/liecio-menu_beep_accept_soft-533780.mp3"],
        volume: 0.8
      }),
      complete: new Howl({
        src: ["audio/koiroylers-awesome-level-up-351714.mp3"],
        volume: 0.85
      })
    };
    window.setMusicMuted = (muted) => Howler.mute(muted);
    window.playSFX = (name) => {
      const sound = sfx[name];
      if (sound) {
        sound.play();
      }
    };
    window.downloadEditorImage = (filename, raw) => {
      const art = JSON.parse(raw);
      const width = Math.max(1, Number(art.width) || 1);
      const height = Math.max(1, Number(art.height) || 1);
      const scale = 32;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = "#fffdf4";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      (art.cells || []).forEach((cell, index) => {
        if (!cell || cell.a <= 0) {
          return;
        }
        const x = index % width;
        const y = Math.floor(index / width);
        ctx.fillStyle = `rgb(${cell.r}, ${cell.g}, ${cell.b})`;
        ctx.fillRect(x * scale, y * scale, scale, scale);
      });
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/jpeg", 0.95);
      link.download = filename || "pixaross-art.jpg";
      document.body.appendChild(link);
      link.click();
      link.remove();
    };
    window.__pendingEditorImageImport = "";
    window.__pendingEditorPackImport = "";
    window.__pendingEditorColor = "";
	window.__pendingEditorTitle = "";
	window.__pendingCommunityImport = "";
	window.__pendingCommunityResult = "";
	window.__pendingCommunityCatalog = "";
	window.__pendingCommunityCloudDrafts = "";
	window.__pendingCommunityCreators = "";
	window.__pendingCommunityGallery = "";
	window.__pendingCommunityChat = "";
	window.__pendingCommunityPublished = "";
	window.__pendingCommunityPublishedID = "";
	window.__pendingCommunityPublishedPackID = "";
	window.__pendingTextPaste = "";
	const clipboardTarget = document.getElementById("clipboard");
	const focusClipboardTarget = () => {
	  if (document.activeElement !== clipboardTarget) {
	    clipboardTarget.focus({ preventScroll: true });
	  }
	};
	window.addEventListener("pointerdown", () => setTimeout(focusClipboardTarget, 0));
	window.addEventListener("keydown", focusClipboardTarget);
	clipboardTarget.addEventListener("paste", (event) => {
	  const text = event.clipboardData?.getData("text/plain") || "";
	  if (!text) return;
	  window.__pendingTextPaste = text;
	  clipboardTarget.value = "";
	  event.preventDefault();
	});
	window.addEventListener("paste", (event) => {
	  const text = event.clipboardData?.getData("text/plain") || "";
	  if (!text) return;
	  window.__pendingTextPaste = text;
	  event.preventDefault();
	});
	window.takeTextPaste = () => {
	  const value = window.__pendingTextPaste || "";
	  window.__pendingTextPaste = "";
	  return value;
	};
	const communitySessionKey = "pixaross.community.session";
	const communityConfig = () => ({
	  url: String(window.SUPABASE_URL || "").replace(/\/$/, ""),
	  key: String(window.SUPABASE_ANON_KEY || "")
	});
	const readCommunitySession = () => {
	  try { return JSON.parse(localStorage.getItem(communitySessionKey) || "null"); } catch (_) { return null; }
	};
	const writeCommunitySession = (session) => localStorage.setItem(communitySessionKey, JSON.stringify(session));
	let communityRefreshPromise = null;
	const refreshCommunitySession = async () => {
	  if (communityRefreshPromise) return communityRefreshPromise;
	  const session = readCommunitySession();
	  const { url, key } = communityConfig();
	  if (!session?.refresh_token || !url || !key) return session;
	  communityRefreshPromise = (async () => {
	    const response = await fetch(`${url}/auth/v1/token?grant_type=refresh_token`, {
	      method: "POST", headers: { apikey: key, "Content-Type": "application/json" },
	      body: JSON.stringify({ refresh_token: session.refresh_token })
	    });
	    const body = await response.json();
	    if (!response.ok) {
	      localStorage.removeItem(communitySessionKey);
	      throw new Error(body.msg || body.message || "session expired; sign in again");
	    }
	    const refreshed = {
	      access_token: body.access_token,
	      refresh_token: body.refresh_token || session.refresh_token,
	      expires_at: Math.floor(Date.now()/1000) + Number(body.expires_in || 3600)
	    };
	    writeCommunitySession(refreshed);
	    return refreshed;
	  })();
	  try { return await communityRefreshPromise; } finally { communityRefreshPromise = null; }
	};
	const validCommunitySession = async () => {
	  const session = readCommunitySession();
	  if (!session?.access_token) return null;
	  if (Number(session.expires_at || 0) > Math.floor(Date.now()/1000) + 60) return session;
	  return refreshCommunitySession();
	};
	const communityHeaders = (token) => {
	  const { key } = communityConfig();
	  return { apikey: key, Authorization: `Bearer ${token || key}`, "Content-Type": "application/json" };
	};
	const setCommunityResult = (message) => { window.__pendingCommunityResult = String(message || ""); };
	window.takeCommunityResult = () => {
	  const result = window.__pendingCommunityResult || "";
	  window.__pendingCommunityResult = "";
	  return result;
	};
	window.takeCommunityPublishedID = () => {
	  const id = window.__pendingCommunityPublishedID || "";
	  window.__pendingCommunityPublishedID = "";
	  return id;
	};
	window.takeCommunityPublishedPackID = () => {
	  const id = window.__pendingCommunityPublishedPackID || "";
	  window.__pendingCommunityPublishedPackID = "";
	  return id;
	};
	const hashParams = new URLSearchParams(location.hash.replace(/^#/, ""));
	if (hashParams.get("access_token")) {
	  writeCommunitySession({
	    access_token: hashParams.get("access_token"),
	    refresh_token: hashParams.get("refresh_token"),
	    expires_at: Math.floor(Date.now() / 1000) + Number(hashParams.get("expires_in") || 3600)
	  });
	  history.replaceState(null, "", location.pathname + location.search);
	  setCommunityResult("signed in");
	}
	if (readCommunitySession()?.refresh_token) {
	  validCommunitySession().catch((error) => setCommunityResult(error.message));
	  setInterval(() => validCommunitySession().catch(() => null), 5 * 60 * 1000);
	}
	window.requestCommunitySignIn = async (email) => {
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  if (!email) return;
	  try {
	    const redirectTo = location.href.split("#")[0];
	    const response = await fetch(`${url}/auth/v1/otp?redirect_to=${encodeURIComponent(redirectTo)}`, {
	      method: "POST",
	      headers: communityHeaders(),
	      body: JSON.stringify({ email, create_user: true })
	    });
	    if (!response.ok) throw new Error((await response.json()).msg || "Sign-in request failed");
	    setCommunityResult("check your email for the sign-in link");
	  } catch (error) {
	    setCommunityResult(error.message || "sign in failed");
	  }
	};
	window.requestCommunitySignOut = () => {
	  localStorage.removeItem(communitySessionKey);
	  setCommunityResult("signed out");
	};
	window.requestCommunityGoogleSignIn = () => {
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  const redirectTo = location.href.split("#")[0];
	  location.assign(`${url}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`);
	};
	window.communityAccountLabel = () => readCommunitySession()?.access_token ? "Account" : "Sign in";
	window.communitySignedIn = () => Boolean(readCommunitySession()?.access_token);
	window.communityDisplayName = () => {
	  try {
	    const token = readCommunitySession()?.access_token || "";
	    const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
	    return payload.user_metadata?.full_name || payload.user_metadata?.name || payload.email?.split("@")[0] || "Creator";
	  } catch (_) { return "Creator"; }
	};
	window.requestCommunityPublish = async (raw, submitOfficial, rightsConfirmed, previewRaw) => {
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session || !session.access_token) {
	    setCommunityResult("sign in before publishing");
	    return;
	  }
	  try {
	    const draft = JSON.parse(raw);
	    const response = await fetch(`${url}/rest/v1/rpc/publish_level`, {
	      method: "POST",
	      headers: communityHeaders(session.access_token),
	      body: JSON.stringify({
	        p_local_id: draft.id,
	        p_title: draft.title || "Untitled",
	        p_description: draft.description || "",
	        p_tags: (draft.tags || []).slice(0, 8),
	        p_puzzle: draft.puzzle,
	        p_submit_official: Boolean(submitOfficial),
	        p_rights_confirmed: Boolean(rightsConfirmed)
	      })
	    });
	    const body = await response.json();
	    if (!response.ok) throw new Error(body.message || body.hint || "Publish failed");
	    if (previewRaw) {
	      const previewResponse = await fetch(`${url}/rest/v1/rpc/set_content_preview`, {
	        method: "POST", headers: communityHeaders(session.access_token),
	        body: JSON.stringify({ p_kind: "art", p_content_id: body.levelId, p_preview_pixels: JSON.parse(previewRaw) })
	      });
	      if (!previewResponse.ok) throw new Error((await previewResponse.json()).message || "Cover upload failed");
	    }
	    window.__pendingCommunityPublishedID = draft.id;
	    window.requestCommunityGallery?.(window.__communityGalleryKind || "all", window.__communityGallerySort || "new");
	    setCommunityResult(submitOfficial ? "published and sent for main-game review" : "level published");
	  } catch (error) {
	    setCommunityResult(error.message || "publish failed");
	  }
	};
	window.requestCommunityPackPublish = async (raw, previewRaw) => {
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session?.access_token) return setCommunityResult("sign in and publish each level before publishing a pack");
	  try {
	    const payload = JSON.parse(raw);
	    const pack = payload.pack || payload;
	    const response = await fetch(`${url}/rest/v1/rpc/publish_pack`, {
	      method: "POST",
	      headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_title: pack.title || "My Pack", p_description: pack.description || "", p_level_local_ids: (pack.items || []).map((item) => item.levelId) })
	    });
	    const body = await response.json();
	    if (!response.ok) throw new Error(body.message || body.hint || "Pack publish failed");
	    if (previewRaw) {
	      const previewResponse = await fetch(`${url}/rest/v1/rpc/set_content_preview`, {
	        method: "POST", headers: communityHeaders(session.access_token),
	        body: JSON.stringify({ p_kind: "pack", p_content_id: body.packId, p_preview_pixels: JSON.parse(previewRaw) })
	      });
	      if (!previewResponse.ok) throw new Error((await previewResponse.json()).message || "Cover upload failed");
	    }
	    window.__pendingCommunityPublishedPackID = pack.id;
	    window.requestCommunityGallery?.(window.__communityGalleryKind || "all", window.__communityGallerySort || "new");
	    setCommunityResult("pack published");
	  } catch (error) {
	    setCommunityResult(error.message || "pack publish failed");
	  }
	};
	window.takeCommunityCatalog = () => {
	  const value = window.__pendingCommunityCatalog || "";
	  window.__pendingCommunityCatalog = "";
	  return value;
	};
	window.requestCommunityCatalog = async (kind) => {
	  const { url, key } = communityConfig();
	  if (!url || !key || kind !== "levels") return;
	  try {
	    const session = await validCommunitySession().catch(() => null);
	    const response = await fetch(`${url}/rest/v1/level_versions?select=id,level_id,version,title,description,tags,puzzle,published_at&order=published_at.desc&limit=20`, {
	      headers: communityHeaders(session?.access_token)
	    });
	    const rows = await response.json();
	    if (!response.ok) {
	      const missingSchema = /level_versions|schema cache|relation/i.test(rows.message || "");
	      throw new Error(missingSchema ? "Community database setup is not finished yet" : (rows.message || "Catalog request failed"));
	    }
	    window.__pendingCommunityCatalog = JSON.stringify(rows.map((row) => ({
	      id: row.id,
	      levelId: row.level_id,
	      version: row.version,
	      title: row.title,
	      description: row.description,
	      tags: row.tags,
	      puzzle: row.puzzle,
	      publishedAt: row.published_at
	    })));
	  } catch (error) {
	    setCommunityResult(error.message || "could not load community levels");
	  }
	};
	window.syncCommunityDraft = async (raw) => {
	  const { url, key } = communityConfig();
	  const session = await validCommunitySession().catch(() => null);
	  if (!url || !key || !session?.access_token) return;
	  try {
	    await fetch(`${url}/rest/v1/rpc/save_draft`, {
	      method: "POST", headers: communityHeaders(session.access_token), body: JSON.stringify({ p_draft: JSON.parse(raw) })
	    });
	  } catch (_) {
	    // Local save remains authoritative while offline.
	  }
	};
	window.deleteCommunityCloudDraft = async (id) => {
	  const { url, key } = communityConfig();
	  const session = await validCommunitySession().catch(() => null);
	  if (!url || !key || !session?.access_token) return;
	  try {
	    const response = await fetch(`${url}/rest/v1/drafts?local_id=eq.${encodeURIComponent(id)}`, {
	      method: "DELETE", headers: communityHeaders(session.access_token)
	    });
	    if (!response.ok) throw new Error("Cloud delete failed");
	  } catch (_) {
	    setCommunityResult("deleted locally; cloud delete will retry after sign-in");
	  }
	};
	window.takeCommunityCloudDrafts = () => {
	  const value = window.__pendingCommunityCloudDrafts || "";
	  window.__pendingCommunityCloudDrafts = "";
	  return value;
	};
	window.requestCommunityCloudDrafts = async () => {
	  const { url, key } = communityConfig();
	  const session = await validCommunitySession().catch(() => null);
	  if (!url || !key || !session?.access_token) return;
	  try {
	    const response = await fetch(`${url}/rest/v1/drafts?select=local_id,title,description,tags,puzzle,playtested,updated_at&order=updated_at.desc`, { headers: communityHeaders(session.access_token) });
	    const rows = await response.json();
	    if (!response.ok) throw new Error(rows.message || "Draft sync failed");
	    window.__pendingCommunityCloudDrafts = JSON.stringify(rows.map((row) => ({
	      id: row.local_id, title: row.title, description: row.description, tags: row.tags,
	      visibility: "draft", status: "draft", playtested: row.playtested, version: 1,
	      updatedAt: row.updated_at, puzzle: row.puzzle
	    })));
	  } catch (error) {
	    setCommunityResult(error.message || "could not sync cloud drafts");
	  }
	};
	window.takeCommunityCreators = () => {
	  const value = window.__pendingCommunityCreators || "";
	  window.__pendingCommunityCreators = "";
	  return value;
	};
	window.requestCommunityCreators = async () => {
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  try {
	    const session = await validCommunitySession().catch(() => null);
	    const response = await fetch(`${url}/rest/v1/rpc/browse_creators`, {
	      method: "POST", headers: communityHeaders(session?.access_token), body: "{}"
	    });
	    const body = await response.json();
	    if (!response.ok) {
	      const missingSchema = /browse_creators|schema cache|function/i.test(body.message || "");
	      throw new Error(missingSchema ? "Creator profiles need database migration 002" : (body.message || "Could not load creators"));
	    }
	    window.__pendingCommunityCreators = JSON.stringify(body || []);
	  } catch (error) {
	    setCommunityResult(error.message || "could not load creators");
	  }
	};
	window.syncCommunityProfile = async (raw, bio, displayName, social) => {
	  const { url, key } = communityConfig();
	  const session = await validCommunitySession().catch(() => null);
	  if (!url || !key || !session?.access_token) return;
	  try {
	    const cleanedSocial = String(social || "").replace(/https?:\/\/|www\.|\/|\\/gi, "").slice(0, 80);
	    const response = await fetch(`${url}/rest/v1/rpc/save_creator_profile`, {
	      method: "POST", headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_avatar_puzzle: JSON.parse(raw), p_bio: String(bio || "").slice(0, 120), p_display_name: String(displayName || "Creator").slice(0, 40), p_social: cleanedSocial })
	    });
	    if (!response.ok) throw new Error((await response.json()).message || "Profile sync failed");
	    window.requestCommunityCreators?.();
	  } catch (_) {
	    // The local badge remains available while offline.
	  }
	};
	window.takeCommunityGallery = () => {
	  const value = window.__pendingCommunityGallery || "";
	  window.__pendingCommunityGallery = "";
	  return value;
	};
	window.takeCommunityPublished = () => {
	  const value = window.__pendingCommunityPublished || "";
	  window.__pendingCommunityPublished = "";
	  return value;
	};
	window.requestCommunityPublished = async () => {
	  const { url, key } = communityConfig();
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!url || !key || !session?.access_token) return setCommunityResult("sign in to view published work");
	  try {
	    const response = await fetch(`${url}/rest/v1/rpc/browse_my_published`, {
	      method: "POST", headers: communityHeaders(session.access_token), body: "{}"
	    });
	    const body = await response.json();
	    if (!response.ok) throw new Error(body.message || "Could not load published work");
	    window.__pendingCommunityPublished = JSON.stringify(body || []);
	  } catch (error) { setCommunityResult(error.message || "could not load published work"); }
	};
	window.unpublishCommunityItem = async (kind, id) => {
	  const { url } = communityConfig();
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session?.access_token) return setCommunityResult("sign in to manage published work");
	  try {
	    const response = await fetch(`${url}/rest/v1/rpc/unpublish_community_item`, {
	      method: "POST", headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_kind: kind, p_content_id: id })
	    });
	    const body = await response.text();
	    if (!response.ok) throw new Error(JSON.parse(body || "{}").message || "Could not unpublish item");
	    setCommunityResult(`${kind} unpublished`);
	    window.requestCommunityPublished();
	  } catch (error) { setCommunityResult(error.message || "could not unpublish item"); }
	};
	window.requestCommunityGallery = async (kind, sort) => {
	  window.__communityGalleryKind = kind;
	  window.__communityGallerySort = sort;
	  const { url, key } = communityConfig();
	  if (!url || !key) return setCommunityResult("community cloud is not configured yet");
	  try {
	    const session = await validCommunitySession().catch(() => null);
	    const loadKind = async (requestedKind) => {
	      const response = await fetch(`${url}/rest/v1/rpc/browse_gallery`, {
	        method: "POST", headers: communityHeaders(session?.access_token),
	        body: JSON.stringify({ p_kind: requestedKind, p_sort: sort })
	      });
	      const body = await response.json();
	      if (!response.ok) throw new Error(body.message || "Could not load gallery");
	      return body || [];
	    };
	    let body = kind === "all" ? (await Promise.all([loadKind("art"), loadKind("pack")])).flat() : await loadKind(kind);
	    body.sort((a,b) => sort === "top" ? ((b.likes || 0)-(a.likes || 0) || (b.plays || 0)-(a.plays || 0) || String(b.publishedAt).localeCompare(String(a.publishedAt))) : sort === "played" ? ((b.plays || 0)-(a.plays || 0) || String(b.publishedAt).localeCompare(String(a.publishedAt))) : String(b.publishedAt).localeCompare(String(a.publishedAt)));
	    window.__pendingCommunityGallery = JSON.stringify(body);
	  } catch (error) {
	    setCommunityResult(error.message || "could not load gallery");
	  }
	};
	window.recordCommunityPlay = async (levelId) => {
	  const { url, key } = communityConfig();
	  if (!url || !key || !levelId) return;
	  try {
	    const session = await validCommunitySession().catch(() => null);
	    const response = await fetch(`${url}/rest/v1/rpc/record_level_play`, {
	      method: "POST", headers: communityHeaders(session?.access_token),
	      body: JSON.stringify({ p_level_id: levelId })
	    });
	    if (!response.ok) console.warn("play event skipped", await response.text());
	  } catch (error) {
	    console.warn("play event skipped", error);
	  }
	};
	window.takeCommunityChat = () => {
	  const value = window.__pendingCommunityChat || "";
	  window.__pendingCommunityChat = "";
	  return value;
	};
	window.requestCommunityChat = async (kind, id) => {
	  const { url, key } = communityConfig();
	  if (!url || !key || !kind || !id) return setCommunityResult("community cloud is not configured yet");
	  try {
	    const session = await validCommunitySession().catch(() => null);
	    const response = await fetch(`${url}/rest/v1/rpc/browse_content_chat`, {
	      method: "POST", headers: communityHeaders(session?.access_token),
	      body: JSON.stringify({ p_kind: kind, p_content_id: id })
	    });
	    const body = await response.json();
	    if (!response.ok) throw new Error(body.message || "Could not load chat");
	    window.__pendingCommunityChat = JSON.stringify(body || []);
	  } catch (error) {
	    setCommunityResult(error.message || "could not load chat");
	  }
	};
	window.postCommunityChat = async (kind, id, body) => {
	  const { url } = communityConfig();
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session?.access_token) return setCommunityResult("sign in to chat");
	  try {
	    const response = await fetch(`${url}/rest/v1/rpc/post_content_chat`, {
	      method: "POST", headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_kind: kind, p_content_id: id, p_body: String(body || "").slice(0, 220) })
	    });
	    const result = await response.json();
	    if (!response.ok) throw new Error(result.message || "Could not send chat");
	    window.requestCommunityChat(kind, id);
	  } catch (error) {
	    setCommunityResult(error.message || "could not send chat");
	  }
	};
	window.toggleCommunityLike = async (kind, id) => {
	  const { url } = communityConfig();
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session?.access_token) return setCommunityResult("sign in to like published work");
	  try {
	    const response = await fetch(`${url}/rest/v1/rpc/toggle_gallery_like`, {
	      method: "POST", headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_kind: kind, p_content_id: id })
	    });
	    const body = await response.json();
	    if (!response.ok) throw new Error(body.message || "Could not update like");
	    window.requestCommunityGallery(window.__communityGalleryKind || kind, window.__communityGallerySort || "new");
	  } catch (error) {
	    setCommunityResult(error.message || "could not update like");
	  }
	};
	window.promoteCommunityItem = async (kind, id) => {
	  const { url } = communityConfig();
	  const session = await validCommunitySession().catch((error) => { setCommunityResult(error.message); return null; });
	  if (!session?.access_token) return setCommunityResult("sign in to promote work");
	  try {
	    const response = await fetch(`${url}/rest/v1/rpc/set_profile_promotion`, {
	      method: "POST", headers: communityHeaders(session.access_token),
	      body: JSON.stringify({ p_kind: kind, p_content_id: id })
	    });
	    const rawBody = await response.text();
	    const body = rawBody ? JSON.parse(rawBody) : null;
	    if (!response.ok) throw new Error(body?.message || "Could not promote item");
	    setCommunityResult("profile promotion updated");
	    window.requestCommunityGallery(window.__communityGalleryKind || kind, window.__communityGallerySort || "new");
	    window.requestCommunityPublished?.();
	  } catch (error) {
	    setCommunityResult(error.message || "could not promote item");
	  }
	};
    window.takeEditorImageImport = () => {
      const raw = window.__pendingEditorImageImport || "";
      window.__pendingEditorImageImport = "";
      return raw;
    };
    window.takeEditorPackImport = () => {
      const raw = window.__pendingEditorPackImport || "";
      window.__pendingEditorPackImport = "";
      return raw;
    };
    window.takeEditorColorPicker = () => {
      const value = window.__pendingEditorColor || "";
      window.__pendingEditorColor = "";
      return value;
    };
	window.takeCommunityImport = () => {
	  const raw = window.__pendingCommunityImport || "";
	  window.__pendingCommunityImport = "";
	  return raw;
	};
	const readImageFile = (file) => new Promise((resolve, reject) => {
	  const image = new Image();
	  image.onload = () => {
	    URL.revokeObjectURL(image.src);
	    resolve(image);
	  };
	  image.onerror = reject;
	  image.src = URL.createObjectURL(file);
	});
	const frameEntries = (metadata) => {
	  if (!metadata || !metadata.frames) return [];
	  if (Array.isArray(metadata.frames)) {
	    return metadata.frames.map((entry) => [entry.filename || entry.name || "frame", entry.frame]);
	  }
	  return Object.entries(metadata.frames).map(([name, entry]) => [name, entry.frame]);
	};
	const sampledPixels = (image, frame, size) => {
	  const canvas = document.createElement("canvas");
	  canvas.width = size;
	  canvas.height = size;
	  const ctx = canvas.getContext("2d", { willReadFrequently: true });
	  ctx.imageSmoothingEnabled = false;
	  ctx.clearRect(0, 0, size, size);
	  ctx.drawImage(image, frame.x, frame.y, frame.w, frame.h, 0, 0, size, size);
	  return ctx.getImageData(0, 0, size, size).data;
	};
	const pixelBackground = (data) => {
	  if (data[3] < 16) return [0, 0, 0, 0];
	  return [data[0], data[1], data[2], data[3]];
	};
	const isBackground = (data, index, bg) => {
	  if (data[index + 3] < 16) return true;
	  if (bg[3] < 16) return false;
	  return Math.abs(data[index] - bg[0]) + Math.abs(data[index + 1] - bg[1]) + Math.abs(data[index + 2] - bg[2]) < 18;
	};
	const rgba = (r, g, b, a) => `#${[r, g, b, a].map((n) => n.toString(16).padStart(2, "0")).join("").toUpperCase()}`;
	const puzzleFromPair = (image, beforeFrame, afterFrame, size, title, index) => {
	  const before = sampledPixels(image, beforeFrame, size);
	  const after = sampledPixels(image, afterFrame, size);
	  const beforeBg = pixelBackground(before);
	  const afterBg = pixelBackground(after);
	  const skeletonPixels = [];
	  const revealPixels = [];
	  const solution = [];
	  for (let y = 0; y < size; y++) {
	    const beforeRow = [];
	    const afterRow = [];
	    let solutionRow = "";
	    for (let x = 0; x < size; x++) {
	      const i = (y * size + x) * 4;
	      const occupied = !isBackground(before, i, beforeBg);
	      beforeRow.push(occupied ? "#000000FF" : "");
	      solutionRow += occupied ? "1" : "0";
	      afterRow.push(isBackground(after, i, afterBg) ? "" : rgba(after[i], after[i + 1], after[i + 2], after[i + 3]));
	    }
	    skeletonPixels.push(beforeRow);
	    revealPixels.push(afterRow);
	    solution.push(solutionRow);
	  }
	  return {
	    id: `import_${Date.now()}_${index}`,
	    title: title || `Imported ${index + 1}`,
	    width: size,
	    height: size,
	    solution,
	    skeletonPixels,
	    revealPixels
	  };
	};
	window.requestCommunityImport = () => {
	  const input = document.createElement("input");
	  input.type = "file";
	  input.multiple = true;
	  input.accept = "image/png,.png,application/json,.json";
	  input.onchange = async () => {
	    try {
	      const files = [...(input.files || [])];
	      const imageFile = files.find((file) => file.type === "image/png" || file.name.toLowerCase().endsWith(".png"));
	      const jsonFile = files.find((file) => file.name.toLowerCase().endsWith(".json"));
	      if (!imageFile) throw new Error("Choose a PNG sprite sheet");
	      const image = await readImageFile(imageFile);
	      const levels = [];
	      if (jsonFile) {
	        const metadata = JSON.parse(await jsonFile.text());
	        const entries = frameEntries(metadata);
	        const frames = new Map(entries.map(([name, frame]) => [name.replace(/\.[^.]+$/, ""), frame]));
	        const beforeNames = [...frames.keys()].filter((name) => /_before$/i.test(name));
	        beforeNames.forEach((beforeName, index) => {
	          const base = beforeName.replace(/_before$/i, "");
	          const afterName = [...frames.keys()].find((name) => name.toLowerCase() === `${base}_after`.toLowerCase());
	          if (!afterName) return;
	          const beforeFrame = frames.get(beforeName);
	          const afterFrame = frames.get(afterName);
	          if (beforeFrame.w !== beforeFrame.h || afterFrame.w !== afterFrame.h) return;
	          if (![8, 10, 15, 20].includes(beforeFrame.w) || afterFrame.w !== beforeFrame.w) return;
	          levels.push(puzzleFromPair(image, beforeFrame, afterFrame, beforeFrame.w, base.replace(/[_-]+/g, " "), index));
	        });
	      } else {
	        const size = Number(prompt("Tile size: 8, 10, 15, or 20. A sheet may contain any number of Before/After pairs.", "10"));
	        if (![8, 10, 15, 20].includes(size)) throw new Error("Unsupported tile size");
	        const horizontal = !confirm("Choose OK for vertical pairs (Before above After). Choose Cancel for horizontal pairs (Before left of After).");
	        const columns = Math.floor(image.width / size);
	        const rows = Math.floor(image.height / size);
	        if (image.width % size || image.height % size) throw new Error("Sheet dimensions must be exact multiples of the tile size");
	        let index = 0;
	        if (horizontal) {
	          for (let y = 0; y < rows; y++) for (let x = 0; x + 1 < columns; x += 2) {
	            levels.push(puzzleFromPair(image, { x: x * size, y: y * size, w: size, h: size }, { x: (x + 1) * size, y: y * size, w: size, h: size }, size, `Imported ${index + 1}`, index++));
	          }
	        } else {
	          for (let y = 0; y + 1 < rows; y += 2) for (let x = 0; x < columns; x++) {
	            levels.push(puzzleFromPair(image, { x: x * size, y: y * size, w: size, h: size }, { x: x * size, y: (y + 1) * size, w: size, h: size }, size, `Imported ${index + 1}`, index++));
	          }
	        }
	      }
	      if (!levels.length) throw new Error("No valid Before/After pairs found. Aseprite frame names must end in _before and _after.");
	      window.__pendingCommunityImport = JSON.stringify({ id: `import_${Date.now()}`, title: imageFile.name, author: "local", version: 1, levels });
	    } catch (error) {
	      alert(error.message || "Import failed");
	    }
	  };
	  input.click();
	};
    window.requestEditorColorPicker = (initial) => {
      const input = document.createElement("input");
      input.type = "color";
      input.value = /^#[0-9a-f]{6}$/i.test(initial) ? initial : "#485c79";
      input.oninput = () => {
        window.__pendingEditorColor = input.value;
      };
      input.onchange = () => {
        window.__pendingEditorColor = input.value;
      };
      input.click();
    };
	window.takeCommunityCoverImport = () => {
	  const value = window.__pendingCommunityCoverImport || "";
	  window.__pendingCommunityCoverImport = "";
	  return value;
	};
	window.requestCommunityCoverImport = (size) => {
	  const input = document.createElement("input");
	  input.type = "file";
	  input.accept = "image/png,image/jpeg,image/webp,image/gif";
	  input.onchange = () => {
	    const file = input.files && input.files[0];
	    if (!file) return;
	    const image = new Image();
	    image.onload = () => {
	      const side = Math.max(8, Number(size) || 10);
	      const canvas = document.createElement("canvas");
	      canvas.width = side; canvas.height = side;
	      const ctx = canvas.getContext("2d", { willReadFrequently: true });
	      ctx.imageSmoothingEnabled = false;
	      const crop = Math.min(image.width, image.height);
	      ctx.drawImage(image, (image.width-crop)/2, (image.height-crop)/2, crop, crop, 0, 0, side, side);
	      const data = ctx.getImageData(0, 0, side, side).data;
	      const rows = [];
	      for (let y=0; y<side; y++) {
	        const row = [];
	        for (let x=0; x<side; x++) {
	          const i=(y*side+x)*4;
	          row.push(data[i+3] ? `#${[data[i],data[i+1],data[i+2],data[i+3]].map(v=>v.toString(16).padStart(2,"0")).join("")}` : "");
	        }
	        rows.push(row);
	      }
	      window.__pendingCommunityCoverImport = JSON.stringify(rows);
	      URL.revokeObjectURL(image.src);
	    };
	    image.src = URL.createObjectURL(file);
	  };
	  input.click();
	};
	window.takeEditorTitle = () => {
	  const title = window.__pendingEditorTitle || "";
	  window.__pendingEditorTitle = "";
	  return title;
	};
	window.clearEditorTitle = () => {
	  window.__pendingEditorTitle = "";
	};
	window.requestEditorTitle = (current) => {
	  const title = prompt("Drawing title:", current || "Untitled");
	  if (title && title.trim()) window.__pendingEditorTitle = title.trim().slice(0, 80);
	};
    window.requestEditorPackImport = () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json,.json";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) {
          return;
        }
        file.text().then((text) => {
          window.__pendingEditorPackImport = text;
        }).catch(() => {
          window.__pendingEditorPackImport = "";
        });
      };
      input.click();
    };
    window.requestEditorImageImport = (size) => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/png,image/jpeg,image/webp,image/gif";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) {
          return;
        }
        const image = new Image();
        image.onload = () => {
          const tileSize = Math.max(1, Number(size) || 10);
          const canvas = document.createElement("canvas");
          canvas.width = tileSize;
          canvas.height = tileSize;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.imageSmoothingEnabled = true;
          const side = Math.min(image.width, image.height);
          const sx = Math.floor((image.width - side) / 2);
          const sy = Math.floor((image.height - side) / 2);
          ctx.clearRect(0, 0, tileSize, tileSize);
          ctx.drawImage(image, sx, sy, side, side, 0, 0, tileSize, tileSize);
          const data = ctx.getImageData(0, 0, tileSize, tileSize).data;
          const cells = [];
          for (let i = 0; i < data.length; i += 4) {
            cells.push({ r: data[i], g: data[i + 1], b: data[i + 2], a: data[i + 3] });
          }
          window.__pendingEditorImageImport = JSON.stringify({ width: tileSize, height: tileSize, cells });
          URL.revokeObjectURL(image.src);
        };
        image.src = URL.createObjectURL(file);
      };
      input.click();
    };
    window.communityFetchStatus = () => {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
		return "Community publishing is coming soon. Guest drafts still save on this device.";
      }
	  return readCommunitySession() ? "Signed in. Published levels and packs will appear here." : "Sign in to publish; guest drafts remain on this device.";
    };

    const startMusic = () => {
      if (!music.playing()) {
        music.play();
      }
      window.removeEventListener("pointerdown", startMusic);
      window.removeEventListener("keydown", startMusic);
    };
    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("keydown", startMusic, { once: true });

    const dev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
    const wasmPath = `game.wasm?v=${Date.now()}`;

    const go = new Go();
    WebAssembly.instantiateStreaming(fetch(wasmPath, { cache: "no-store" }), go.importObject).then((result) => {
      document.getElementById("status").remove();
      go.run(result.instance);
    }).catch((err) => {
      document.getElementById("status").textContent = err;
      console.error(err);
    });

    if (dev) {
      fetch("/_wait").then((res) => {
        if (res.ok) {
          window.location.reload();
        }
      }).catch(() => {
        // Dev-only reload waiting should never interrupt gameplay.
      });
    }
  </script>
</body>
</html>
